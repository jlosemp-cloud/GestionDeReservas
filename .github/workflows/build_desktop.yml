name: Build Windows Desktop
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build App
        run: ./gradlew :desktop:packageReleaseExe :desktop:package
        env:
          GRADLE_OPTS: -Dorg.gradle.java.home=${{ env.JAVA_HOME }}

      - name: Zip Portable Version
        run: |
          $AppPath = Get-ChildItem -Path "desktop/build/compose/binaries" -Filter "app" -Recurse | Select-Object -First 1
          if ($AppPath) {
            Compress-Archive -Path "$($AppPath.FullName)\*" -DestinationPath GestionDeReservas_Portable.zip
          } else {
            Write-Error "No se encontro la carpeta de la aplicacion portable"
            exit 1
          }
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GestionDeReservas-Windows
          path: |
            desktop/build/compose/binaries/**/*.exe
            GestionDeReservas_Portable.zip
          if-no-files-found: error
