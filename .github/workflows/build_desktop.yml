name: Build Windows Desktop
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build App and Installer
        run: ./gradlew :desktop:packageReleaseExe :desktop:package
        env:
          GRADLE_OPTS: -Dorg.gradle.java.home=${{ env.JAVA_HOME }}

      - name: Zip Portable Version
        run: Compress-Archive -Path desktop/build/compose/binaries/main/app/* -DestinationPath GestionDeReservas_Portable.zip
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GestionDeReservas-Windows
          path: |
            desktop/build/compose/binaries/main/exe/*.exe
            GestionDeReservas_Portable.zip
          if-no-files-found: error
